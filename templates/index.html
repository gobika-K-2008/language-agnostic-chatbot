<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Agnostic Chatbot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .chat-wrapper { width: 100%; max-width: 750px; padding: 20px; }
        .chat-header { text-align: center; margin-bottom: 20px; }
        .chat-header h1 { color: #fff; font-size: 1.8rem; font-weight: 700; }
        .chat-header p { color: #a0aec0; font-size: 0.9rem; margin-top: 8px; }

        /* Toggle Switch */
        .toggle-row { display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 14px; }
        .toggle-label { color: #a0aec0; font-size: 0.9rem; }
        .toggle-label.active { color: #68d391; font-weight: 600; }
        .toggle-label.inactive { color: #fc8181; font-weight: 600; }
        .switch { position: relative; width: 56px; height: 28px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background: #fc8181; border-radius: 28px; transition: 0.3s; }
        .slider:before { content: ""; position: absolute; height: 20px; width: 20px; left: 4px; bottom: 4px; background: white; border-radius: 50%; transition: 0.3s; }
        input:checked + .slider { background: #68d391; }
        input:checked + .slider:before { transform: translateX(28px); }
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
        .status-badge.on { background: rgba(104,211,145,0.15); color: #68d391; border: 1px solid rgba(104,211,145,0.3); }
        .status-badge.off { background: rgba(252,129,129,0.15); color: #fc8181; border: 1px solid rgba(252,129,129,0.3); }

        .chat-container { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.4); transition: opacity 0.3s; }
        .chat-container.disabled { opacity: 0.5; pointer-events: none; }
        #chat-box { height: 450px; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 15px; }
        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
        .message { display: flex; gap: 10px; align-items: flex-end; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message.user { flex-direction: row-reverse; }
        .avatar { width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }
        .user .avatar { background: linear-gradient(135deg, #667eea, #764ba2); }
        .bot .avatar { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .bubble { max-width: 75%; padding: 12px 16px; border-radius: 18px; font-size: 0.95rem; line-height: 1.5; word-wrap: break-word; }
        .user .bubble { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border-bottom-right-radius: 4px; }
        .bot .bubble { background: rgba(255,255,255,0.1); color: #e2e8f0; border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.1); }
        .typing { display: flex; gap: 4px; padding: 14px 18px; }
        .typing span { width: 8px; height: 8px; background: #a0aec0; border-radius: 50%; animation: bounce 1.2s infinite; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-8px); } }
        .input-area { padding: 20px; background: rgba(0,0,0,0.2); border-top: 1px solid rgba(255,255,255,0.1); display: flex; gap: 12px; align-items: center; }
        #user-input { flex: 1; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 25px; padding: 12px 20px; color: white; font-size: 0.95rem; outline: none; }
        #user-input::placeholder { color: #718096; }
        #user-input:focus { border-color: rgba(102,126,234,0.6); }
        #send-btn { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.2s; flex-shrink: 0; }
        #send-btn:hover { transform: scale(1.05); }
        #send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        #send-btn svg { width: 20px; height: 20px; fill: white; }
        .welcome { text-align: center; color: #718096; margin: auto; padding: 20px; }
        .welcome .icon { font-size: 3rem; margin-bottom: 10px; }
        #debug { position: fixed; bottom: 10px; left: 10px; right: 10px; background: rgba(0,0,0,0.9); color: #fc8181; padding: 10px; border-radius: 8px; font-size: 0.75rem; display: none; word-break: break-all; z-index: 999; }
    </style>
</head>
<body>
<div class="chat-wrapper">
    <div class="chat-header">
        <h1>💬 Language Agnostic Chatbot</h1>
        <p>Powered by Groq AI · Chat in any language</p>

        <!-- ON/OFF Toggle -->
        <div class="toggle-row">
            <span class="toggle-label inactive" id="off-label">OFF</span>
            <label class="switch">
                <input type="checkbox" id="connection-toggle" checked onchange="toggleConnection()">
                <span class="slider"></span>
            </label>
            <span class="toggle-label active" id="on-label">ON</span>
            <span class="status-badge on" id="status-badge">🟢 Connected</span>
        </div>
    </div>

    <div class="chat-container" id="chat-container">
        <div id="chat-box">
            <div class="welcome"><div class="icon">🌍</div><p>Type a message in any language to get started!</p></div>
        </div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Type your message in any language..." autocomplete="off">
            <button id="send-btn" onclick="sendMessage()">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>
</div>
<div id="debug"></div>

<script>
    const p1 = "gsk_FLkbArn204md";
    const p2 = "VPpp1CbsWGdyb3FY";
    const p3 = "dnpufDQokDz2SEBTeHHdImxR";
    const GROQ_KEY = p1 + p2 + p3;

    const chatBox = document.getElementById("chat-box");
    const input = document.getElementById("user-input");
    const btn = document.getElementById("send-btn");
    const debug = document.getElementById("debug");
    const container = document.getElementById("chat-container");
    const badge = document.getElementById("status-badge");
    const onLabel = document.getElementById("on-label");
    const offLabel = document.getElementById("off-label");
    let welcomeShown = true;
    let isConnected = true;

    input.addEventListener("keydown", e => { if (e.key === "Enter") sendMessage(); });

    function toggleConnection() {
        isConnected = document.getElementById("connection-toggle").checked;
        if (isConnected) {
            container.classList.remove("disabled");
            badge.className = "status-badge on";
            badge.textContent = "🟢 Connected";
            onLabel.className = "toggle-label active";
            offLabel.className = "toggle-label inactive";
            addMessage("bot", "✅ Connection enabled! You can chat now.");
        } else {
            container.classList.add("disabled");
            badge.className = "status-badge off";
            badge.textContent = "🔴 Disconnected";
            onLabel.className = "toggle-label inactive";
            offLabel.className = "toggle-label active";
            // Show message before disabling
            container.classList.remove("disabled");
            addMessage("bot", "🔴 Connection disabled. Toggle ON to resume chatting.");
            container.classList.add("disabled");
        }
    }

    function addMessage(role, text) {
        if (welcomeShown) { chatBox.innerHTML = ""; welcomeShown = false; }
        const msg = document.createElement("div");
        msg.className = "message " + role;
        msg.innerHTML = '<div class="avatar">' + (role === "user" ? "🧑" : "🤖") + '</div><div class="bubble">' + text + '</div>';
        chatBox.appendChild(msg);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function showTyping() {
        if (welcomeShown) { chatBox.innerHTML = ""; welcomeShown = false; }
        const t = document.createElement("div");
        t.className = "message bot"; t.id = "typing";
        t.innerHTML = '<div class="avatar">🤖</div><div class="bubble typing"><span></span><span></span><span></span></div>';
        chatBox.appendChild(t); chatBox.scrollTop = chatBox.scrollHeight;
    }

    function removeTyping() { const t = document.getElementById("typing"); if (t) t.remove(); }

    async function sendMessage() {
        const message = input.value.trim();
        if (!message || !isConnected) return;
        addMessage("user", message);
        input.value = ""; btn.disabled = true; showTyping();
        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + GROQ_KEY
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        { role: "system", content: "You are a helpful assistant that responds in the same language the user writes in." },
                        { role: "user", content: message }
                    ],
                    max_tokens: 1024
                })
            });
            const data = await res.json();
            removeTyping();
            debug.style.display = "block";
            debug.textContent = "HTTP " + res.status + " | " + JSON.stringify(data).substring(0, 300);
            if (data.choices && data.choices[0]) {
                debug.style.display = "none";
                addMessage("bot", data.choices[0].message.content);
            } else {
                addMessage("bot", "API Error: " + (data.error ? data.error.message : JSON.stringify(data)));
            }
        } catch(err) {
            removeTyping();
            debug.style.display = "block";
            debug.textContent = "Fetch error: " + err.message;
            addMessage("bot", "Connection error: " + err.message);
        }
        btn.disabled = false; input.focus();
    }
</script>
</body>
</html>
